<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start free trial — PharmaSight</title>
  <link rel="stylesheet" href="site.css">
  <script src="config.js"></script>
</head>
<body>
  <header>
    <a class="logo" href="index.html">PharmaSight</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="pricing.html">Pricing</a>
      <a href="help.html">Help</a>
    </nav>
  </header>
  <main>
    <h1>Start free trial</h1>
    <p style="color:var(--muted); max-width:36rem;">Creates your organization, HQ branch, and admin user. You will be sent to the operations app to finish setup.</p>
    <form id="signupForm" class="card" style="max-width:420px; margin-top:1.5rem;">
      <div class="form-group">
        <label for="org">Organization name</label>
        <input id="org" name="organization_name" required autocomplete="organization" maxlength="255">
      </div>
      <div class="form-group">
        <label for="full">Your full name</label>
        <input id="full" name="full_name" required autocomplete="name" maxlength="255">
      </div>
      <div class="form-group">
        <label for="email">Work email</label>
        <input id="email" name="email" type="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="phone">Phone (optional)</label>
        <input id="phone" name="phone" type="tel" autocomplete="tel">
      </div>
      <div class="form-group">
        <label for="password">Password (min 8 characters)</label>
        <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Create account</button>
      <div id="err" class="error" style="display:none;"></div>
    </form>
  </main>
  <footer><a href="index.html">Home</a> · PharmaSight</footer>
  <script>
    (function () {
      var form = document.getElementById('signupForm');
      var err = document.getElementById('err');
      var btn = document.getElementById('submitBtn');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        err.style.display = 'none';
        err.textContent = '';
        btn.disabled = true;
        var cfg = window.MARKETING_CONFIG || { API_BASE_URL: '', ERP_APP_URL: '' };
        var api = (cfg.API_BASE_URL || '').replace(/\/$/, '');
        var erp = (cfg.ERP_APP_URL || window.location.origin).replace(/\/$/, '');
        var body = {
          organization_name: document.getElementById('org').value.trim(),
          full_name: document.getElementById('full').value.trim(),
          email: document.getElementById('email').value.trim(),
          phone: document.getElementById('phone').value.trim() || null,
          password: document.getElementById('password').value
        };
        try {
          var res = await fetch(api + '/api/public/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          var data = await res.json().catch(function () { return {}; });
          if (!res.ok) {
            var msg = (typeof data.detail === 'string') ? data.detail : (res.statusText || 'Signup failed');
            err.textContent = msg;
            err.style.display = 'block';
            return;
          }
          var sub = data.tenant_subdomain || '';
          var token = data.signup_handoff_token || '';
          if (!token) {
            err.textContent = 'Account created but handoff token missing. Try signing in from the app.';
            err.style.display = 'block';
            return;
          }
          var q = sub ? ('?tenant=' + encodeURIComponent(sub)) : '';
          var enc = encodeURIComponent(token);
          window.location.href = erp + q + '#handoff_token=' + enc;
        } catch (x) {
          err.textContent = 'Network error. Check API URL and that the backend is running.';
          err.style.display = 'block';
        } finally {
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
