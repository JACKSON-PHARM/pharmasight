<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaSight - Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        .admin-header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .admin-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        .admin-tab {
            padding: 10px 18px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 15px;
            color: #666;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        .admin-tab:hover { color: #333; }
        .admin-tab.active {
            color: #007bff;
            font-weight: 600;
            border-bottom-color: #007bff;
        }
        .admin-tab-content { display: none; }
        .admin-tab-content.active { display: block; }
        .platform-dashboard { position: relative; }
        .platform-dashboard-title { margin-top: 0; }
        .platform-dashboard-subtitle { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
        .platform-dashboard-section { margin-bottom: 28px; }
        .platform-dashboard-section h3 { margin-bottom: 12px; font-size: 1.1rem; }
        .platform-metrics-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .platform-metric-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px 20px;
            min-width: 140px;
        }
        .platform-metric-card--highlight { background: #e8f7f5; border: 1px solid #14b8a6; }
        .platform-metric-value { display: block; font-size: 1.5rem; font-weight: 700; }
        .platform-metric-label { font-size: 0.85rem; color: #666; }
        .platform-metrics-meta { font-size: 0.8rem; color: #888; margin: 8px 0 0 0; }
        .platform-health-status { display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .platform-health-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .platform-health-status--healthy .platform-health-dot { background: #28a745; }
        .platform-health-status--degraded .platform-health-dot { background: #dc3545; }
        .platform-dashboard-grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .platform-dashboard-actions { margin-top: 24px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div>
                <h1>Platform Admin</h1>
                <p style="margin: 4px 0 0 0; font-size: 0.9rem; color: #666;">Company licensing and platform metrics. Access control is managed under Licensing (companies).</p>
            </div>
            <div class="admin-header-actions">
                <button id="logout-btn" class="btn btn-danger">Logout</button>
            </div>
        </div>

        <div class="admin-tabs">
            <button type="button" class="admin-tab active" data-tab="licensing">Licensing</button>
            <button type="button" class="admin-tab" data-tab="platform-dashboard">Platform Dashboard</button>
        </div>

        <div id="licensing-content-wrap" class="admin-tab-content active">
            <div id="platform-licensing-mount"></div>
        </div>

        <div id="platform-dashboard-content-wrap" class="admin-tab-content">
            <div id="platform-dashboard-mount"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/js/qrcode.vendor.iife.js"></script>
    <script src="/js/config.js?v=9"></script>
    <script src="/js/api.js?v=9"></script>
    <script src="/js/utils.js?v=9"></script>

    <script type="module">
        function switchTab(tabId) {
            document.querySelectorAll('.admin-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tabId);
            });
            document.querySelectorAll('.admin-tab-content').forEach(el => {
                const id = el.id === 'platform-dashboard-content-wrap'
                    ? 'platform-dashboard'
                    : (el.id === 'licensing-content-wrap' ? 'licensing' : null);
                el.classList.toggle('active', id === tabId);
            });
            if (tabId === 'platform-dashboard') {
                window.initPlatformDashboard?.();
            }
            if (tabId === 'licensing') {
                window.initPlatformLicensing?.();
            }
        }

        async function initAdminPanel() {
            try {
                const logoutBtn = document.getElementById('logout-btn');
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', () => {
                        localStorage.removeItem('admin_token');
                        localStorage.removeItem('is_admin');
                        if (window.AuthBootstrap) {
                            window.AuthBootstrap.signOut().catch(() => {});
                        }
                        window.location.href = '/#login';
                    });
                }

                document.querySelectorAll('.admin-tab').forEach(btn => {
                    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
                });

                if (!window.API) {
                    await new Promise(resolve => setTimeout(resolve, 200));
                    if (!window.API) {
                        throw new Error('API client not loaded. Please refresh the page.');
                    }
                }

                const { init: initLicensing } = await import('/js/pages/admin_platform_licensing.js?v=11');
                window.initPlatformLicensing = async () => {
                    await initLicensing();
                };
                await window.initPlatformLicensing();

                const { init: initDashboard } = await import('/js/pages/admin_dashboard.js?v=9');
                window.initPlatformDashboard = async () => {
                    await initDashboard();
                };
            } catch (error) {
                console.error('Error loading admin panel:', error);
                const mount = document.getElementById('platform-licensing-mount');
                const msg = error.message || 'Unknown error';
                if (mount) {
                    mount.innerHTML = `
                        <div class="card" style="padding:16px;">
                            <h2 style="margin:0 0 8px 0;">Licensing</h2>
                            <p style="margin:0; color:#b91c1c;"><strong>Error loading admin panel</strong><br>${msg}</p>
                            <p style="margin:12px 0 0 0; font-size:0.9rem; color:#666;">Please refresh and try again.</p>
                        </div>
                    `;
                } else {
                    document.body.innerHTML = `
                        <div style="padding: 20px; text-align: center;">
                            <h2>Error Loading Admin Panel</h2>
                            <p>${msg}</p>
                            <p><a href="/#login">Go to Login</a></p>
                        </div>
                    `;
                }
            }
        }

        async function checkAdminAuth() {
            const adminToken = localStorage.getItem('admin_token');
            const isAdmin = localStorage.getItem('is_admin');

            if (!adminToken || isAdmin !== 'true') {
                try {
                    const { default: AuthBootstrap } = await import('/js/services/auth_bootstrap.js');
                    await AuthBootstrap.init();
                    const user = AuthBootstrap.getCurrentUser();
                    const userEmail = user?.email?.toLowerCase();
                    const adminEmails = ['pharmasightsolutions@gmail.com', 'admin@pharmasight.com'];
                    if (user && adminEmails.includes(userEmail)) {
                        localStorage.setItem('is_admin', 'true');
                        await initAdminPanel();
                        return;
                    }
                } catch (e) {
                    console.log('AuthBootstrap not available');
                }
                window.location.href = '/#login';
                return;
            }

            await initAdminPanel();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', checkAdminAuth);
        } else {
            setTimeout(checkAdminAuth, 100);
        }
    </script>
</body>
</html>
